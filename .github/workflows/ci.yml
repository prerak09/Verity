name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: lint · typecheck · test · build
    runs-on: ubuntu-latest
    env:
      # Dummy values so Prisma client + Next build don't fail on missing env.
      # Real secrets live in Vercel env; CI never touches a real DB.
      DATABASE_URL: postgresql://user:pass@localhost:5432/verity
      DIRECT_URL: postgresql://user:pass@localhost:5432/verity
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_ci_stub
      CLERK_SECRET_KEY: sk_test_ci_stub
      CLERK_WEBHOOK_SECRET: whsec_ci_stub
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build
